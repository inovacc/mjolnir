name: Scheduled Build

on:
  schedule:
    # Run every two weeks on Monday at 00:00 UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: "1.25"

jobs:
  build-and-push-debian:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Debian image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.debian
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=debian
          cache-to: type=gha,mode=max,scope=debian

      - name: Verify Debian image
        run: docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Scan Debian image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-debian.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Debian scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-debian.sarif'
          category: scheduled-debian
        continue-on-error: true

  build-and-push-alpine:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Alpine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.alpine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-alpine
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=alpine

      - name: Verify Alpine image
        run: docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-alpine

      - name: Scan Alpine image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-alpine
          format: 'sarif'
          output: 'trivy-alpine.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Alpine scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-alpine.sarif'
          category: scheduled-alpine
        continue-on-error: true
